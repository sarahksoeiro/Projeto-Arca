<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arca</title>
    <link rel="stylesheet" href="../ADM_denúncias/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1>Arca</h1>
            <img src="img/icone_pata.png" alt="Logo de pata de animal">
        </div>

        <div class="icones">
            <img src="img/icone_headerADM.png" alt="Ícones da header">
        </div>
    </header>
    <section class="secaoInicial">
        <div class="ADMEsquerdo">
            <div class="carrossel">
                <div class="imagens">
                    <div class="slide">
                        <img src="img/propaganda01.png" alt="Imagem 1 do carrossel">
                    </div>
                    <div class="slide">
                        <img src="img/propaganda02.png" alt="Imagem 2 do carrossel">
                    </div>
                    <div class="slide">
                        <img src="img/propaganda03.png" alt="Imagem 3 do carrossel">
                    </div>
                </div>
                <button class="seta esquerda" onclick="mudarSlide(-1)">‹</button>
                <button class="seta direita" onclick="mudarSlide(1)">›</button>
                <div class="indicadores">
                    <span class="indic ativo" onclick="irSlide(0)"></span>
                    <span class="indic" onclick="irSlide(1)"></span>
                    <span class="indic" onclick="irSlide(2)"></span>
                </div>
            </div>
            <div class="flexBotao">
                <button class="botoes2">Atualizar blog de notícias</button>
            </div>
        </div>
        <br>
        <div class="ADMDireito">
            <div class="botoesEmLinha">
                <div class="botoes3">
                    <i class="fa-solid fa-calendar-days"></i>
                    Agendamentos
                </div>
                <div class="botoes3">
                    <i class="fa-solid fa-paw"></i>
                    Painel de pets
                </div>
            </div>
            <div class="botoesEmLinha">
                <a href="atendimentos.html" class="botoes3">
                    <i class="fa-solid fa-headset"></i>
                    <span>Atendimentos</span>
                </a>
                    <a href="parceiros.html" class="botoes3">
                        <i class="fa-solid fa-handshake"></i>
                        <span>Parceiros</span>
                    </a>
            </div>
            <div class="botaoEspecial">
                <i class="fa-solid fa-chart-column"></i>
                Relatórios
            </div>
        </div>
    </section>

    <script src="script.js"></script>

</body>

</html>
