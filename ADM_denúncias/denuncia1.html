<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar denúncia</title>
    <link rel="stylesheet" href="../ADM_denúncias/style.css">
    <!-- MAPA-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
    <header>
        <div class="logo">
            <h1><a href="../Adoção_Inicial/telainicial.html" class="arca">Arca</a></h1>
            <img src="img/icone_pata.png" alt="Logo de pata de animal">
        </div>
        <div class="icones">
            <img src="img/icone_header.png" alt="Ícones da header">
        </div>
    </header>

    <main class="container">
        <!-- LADO ESQUERDO -->
        <section class="tipo_denuncia">
            <h3>Tipo de denúncia:</h3>
            <label>
                <input type="radio" name="denuncia">
                Maus-tratos
            </label>
            <label>
                <input type="radio" name="denuncia">
                Animal abandonado
            </label>
            <label>
                <input type="radio" name="denuncia">
                Animal ferido
            </label>
            <p class="info">
                Informamos que só atendemos o município de Serra.
            </p>
        </section>

        <!-- LADO DIREITO -->
        <section class="formulario">
            <h3>Selecione a localização da denúncia</h3>

            <div id="map"></div>

            <!-- ENDEREÇO COMPLETO -->
            <p id="enderecoCompleto"></p>
            <div class="linha">
                <div class="campo">
                    <label>CEP</label>
                    <input type="text" id="cep" placeholder="Digite o CEP">
                </div>
                <div class="campo">
                    <label>Bairro</label>
                    <input type="text" id="bairro" placeholder="Digite o bairro">
                </div>
            </div>
            <div class="linha">
                <div class="campo rua">
                    <label>Rua</label>
                    <input type="text" id="rua" placeholder="Digite a rua">
                </div>
                <div class="campo numero">
                    <label>Número</label>
                    <input type="text" id="numero" placeholder="Digite o número">
                </div>
            </div>
            <div class="campo">
                <label>Ponto de referência</label>
                <input type="text" id="referencia" placeholder="Ex: próximo à padaria">
            </div>
            <br>
            <div class="campo">
                <label>Descrição do caso</label>
                <textarea rows="5" placeholder="Digite o que aconteceu"></textarea>
            </div>
            <div class="acoes">
                <label class="upload"> + Adicionar foto/vídeo<input type="file" accept="image/*,video/*" hidden></label>
                <div class="continuar">
                    <a href="denuncia2.html" class="letrabotao">Continuar</a>
                </div>
            </div>
        </section>
    </main>

    <!-- LEAFLET(MAPA) -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
