<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Pré-cadastro Castração</title>
    <link rel="stylesheet" href="../ADM_denúncias/style.css">
</head>

<body>
   <header>
        <div class="logo">
            <h1><a href="../Adoção_Inicial/telainicial.html" class="arca">Arca</a></h1>
            <img src="../ADM_denúncias/img/icone_pata.png" alt="Logo pata">
        </div>
        <div class="icones">
            <img src="../ADM_denúncias/img/icone_header.png" alt="Ícones">
        </div>
    </header>
<section class="container3">
    <div class="tela">
        <h2>Dados do Tutor</h2>
        <label>Nome completo</label>
        <input type="text" id="tutorNome">
        <label>CPF</label>
        <input type="text" id="tutorCpf">
        <label>RG</label>
        <input type="text" id="tutorRg">
        <label>Data nascimento</label>
        <input type="date" id="tutorNasc">
        <label>Telefone</label>
        <input type="tel" id="tutorTel">
        <label>E-mail</label>
        <input type="email" id="tutorEmail">
        
        <h2>Documentos</h2>
        <label>Comprovante de Residência</label>
        <input type="file">
        <label>Documento de identificação</label>
        <input type="file">
        
        <h2>Dados do Pet</h2>
        <label>Nome</label>
        <input type="text" id="petNome">
        <label>Idade</label>
        <input type="text" id="petIdade">
        <label>Espécie</label>
        <select id="petEspecie">
            <option>Cão</option>
            <option>Gato</option>
        </select>
        <label>Sexo</label>
        <select id="petSexo">
            <option>Macho</option>
            <option>Fêmea</option>
        </select>
        
        <button id="btnContinuarCastracao">Continuar</button>
        <div class="botoes2">
        <a href="../Adoção_Inicial/telainicial.html">Voltar</a>
        </div>
    </div>
</section>
    <script src="../Login_castração/a.js"></script>
</body>

</html>
