<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Arca - Detalhes do Animal</title>

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="../ADM_denúncias/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <h1>Arca</h1>
            <img src="../ADM_denúncias/img/icone_pata.png" alt="Logo de pata">
        </div>

        <div class="icones">
            <img src="../ADM_denúncias/img/icone_headerADM.png" alt="Ícones do cabeçalho">
        </div>
    </header>


    <main class="detalhes-animal">

        <div class="container-animal">

            
            <div class="galeria">

                <img src="femeaadocaocachorro.webp" class="foto-principal"
                    alt="Paçoca em destaque">

                <div class="miniaturas">

                    <button class="arrow-mini">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>

                    <div class="miniatura"></div>
                    <div class="miniatura" ></div>
                    <div class="miniatura video">
                        <i class="fa-solid fa-play"></i>
                    </div>

                    <button class="arrow-mini">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>

                </div>

            </div>

            <!-- DIREITA -->
            <div class="info-animal">

                <span class="sexo">Fêmea</span>

                <h4>Informações do Animal</h4>

                <h1>Paçoca, 3 anos</h1>

                <div class="tags">

                    <span class="tag-info">
                        Porte Médio
                    </span>

                    <span class="tag-info">
                        Castrada
                    </span>

                    <span class="tag-info">
                        SRD
                    </span>

                </div>

                <p class="cidade">
                    <i class="fa-solid fa-location-dot"></i>
                    Barcelona, Serra
                </p>

                <div class="descricao-box">

                    Paçoca é uma cachorra dócil e que se relaciona facilmente
                    com humanos e outros animais.

                    Foi encontrada abandonada nas ruas.
                    Nunca teve filhotes e é uma ótima companheira.

                </div>

                <button class="btn-adotar">
                    Quero Adotar!
                </button>

                <div class="acoes-animal">

                    <i class="fa-regular fa-paper-plane"></i>

                    <i class="fa-solid fa-heart"></i>

                    <i class="fa-solid fa-share"></i>

                </div>

            </div>

        </div>

    </main>

</body>

</html>
