<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendar Horário</title>
    <link rel="stylesheet" href="../ADM_denúncias/style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h1><a href="../Adoção_Inicial/telainicial.html" class="arca">Arca</a></h1>
            <img src="../ADM_denúncias/img/icone_pata.png" alt="Logo pata">
        </div>
        <div class="icones">
            <img src="../ADM_denúncias/img/icone_header.png" alt="Ícones">
        </div>
    </header>
    <section class="container3">
    <div class="tela">
        <h2>Escolha data e horário</h2>
        <label>Data</label>
        <input type="date" id="dataAgenda">
        <label>Horário</label>
        <select id="horarioAgenda">
            <option>08:00</option>
            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>13:00</option>
            <option>14:00</option>
        </select>

        <label>Local de Atendimento</label>
        <select>
            <option value="">Selecione uma unidade</option>
        </select>

        <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="termos" style="width: auto; margin: 0;">
            Li e aceito os Termos
        </label>

        <button id="btnConfirmarAgendamento">Confirmar</button>
        <div class="botoes2">
        <a href="../Login_castração/castracao-identificacao.html">Voltar</a>
        </div>
    </div>
    </section>
    <script src="../Login_castração/a.js"></script>
</body>

</html>
